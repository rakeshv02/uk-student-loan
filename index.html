<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Student Loan Repayment Calculator 2024 – Plan 1, 2, 4 & 5 | Tabutility</title>
  <meta name="description" content="Free UK student loan repayment calculator. See monthly repayments, total paid, interest accrued and years to pay off for Plan 1, Plan 2, Plan 4, Plan 5 and Postgraduate loans." />
  <meta name="keywords" content="UK student loan calculator, plan 2 repayment, plan 5 student loan, student loan repayment, how much student loan repayment, SLC" />
  <link rel="canonical" href="https://uk-student-loan.tabutility.com/" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7039091592734005" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#f5f3ff;}.site-nav{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}.site-nav a{color:#a5b4fc;text-decoration:none;font-size:14px;font-family:'Segoe UI',Arial,sans-serif;}.nav-brand{color:#fff;font-weight:700;font-size:16px;font-family:'Segoe UI',Arial,sans-serif;}#ad-top,#ad-bottom{text-align:center;padding:10px;background:#fff;}</style>
</head>
<body>
  <nav class="site-nav"><span class="nav-brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
  <div id="ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <div id="root"></div>
  <div id="ad-bottom"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <script type="text/babel">
    const { useState } = React;

    const PLANS = {
      plan1: { name:"Plan 1", threshold:22015, rate:0.09, interestRate:0.060, writeOff:25, desc:"Started uni before 2012 (England/Wales) or before 2006 (NI)" },
      plan2: { name:"Plan 2", threshold:27295, rate:0.09, interestRate:0.075, writeOff:30, desc:"Started uni Sept 2012 – July 2023 (England/Wales)" },
      plan4: { name:"Plan 4", threshold:27660, rate:0.09, interestRate:0.060, writeOff:30, desc:"Scottish students who started from 1998 onwards" },
      plan5: { name:"Plan 5", threshold:25000, rate:0.09, interestRate:0.075, writeOff:40, desc:"Started uni Aug 2023 onwards (England)" },
      postgrad: { name:"Postgraduate", threshold:21000, rate:0.06, interestRate:0.075, writeOff:30, desc:"Masters or Doctoral loan (England/Wales)" },
    };

    const fmt = n => "£" + Math.round(n).toLocaleString();
    const fmtD = n => "£" + n.toFixed(2);

    function simulate(balance, salary, plan, salaryGrowth) {
      const { threshold, rate, interestRate, writeOff } = plan;
      let remaining = balance;
      let totalPaid = 0;
      let totalInterest = 0;
      let yearsPaid = 0;
      const yearlyData = [];

      for (let year = 1; year <= writeOff; year++) {
        const currentSalary = salary * Math.pow(1 + salaryGrowth / 100, year - 1);
        const annualRepayment = currentSalary > threshold ? Math.min((currentSalary - threshold) * rate, remaining) : 0;
        const interest = remaining * interestRate;
        remaining = remaining + interest - annualRepayment;
        totalPaid += annualRepayment;
        totalInterest += interest;
        yearlyData.push({ year, salary: currentSalary, repayment: annualRepayment, interest, balance: Math.max(0, remaining) });
        if (remaining <= 0) { yearsPaid = year; break; }
        if (year === writeOff) yearsPaid = writeOff;
      }

      return { totalPaid, totalInterest, yearsPaid, writtenOff: Math.max(0, remaining), paidOff: remaining <= 0, yearlyData };
    }

    function App() {
      const [salary, setSalary] = useState("35000");
      const [balance, setBalance] = useState("45000");
      const [plan, setPlan] = useState("plan2");
      const [salaryGrowth, setSalaryGrowth] = useState("2");
      const [result, setResult] = useState(null);

      const calculate = () => {
        const p = PLANS[plan];
        const sal = parseFloat(salary) || 0;
        const bal = parseFloat(balance) || 0;
        const growth = parseFloat(salaryGrowth) || 0;
        const monthlyRepayment = sal > p.threshold ? ((sal - p.threshold) * p.rate) / 12 : 0;
        const sim = simulate(bal, sal, p, growth);
        setResult({ plan: p, sal, bal, monthlyRepayment, ...sim });
      };

      const inputStyle = { width:"100%", padding:"12px", border:"2px solid #e9d5ff", borderRadius:10, fontSize:16, boxSizing:"border-box", outline:"none" };
      const labelStyle = { display:"block", fontWeight:600, marginBottom:6, color:"#333" };

      return (
        <div style={{ fontFamily:"'Segoe UI',Arial,sans-serif", background:"#f5f3ff", minHeight:"100vh", padding:"20px" }}>
          <div style={{ maxWidth:820, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:32 }}>
              <div style={{ fontSize:48, marginBottom:8 }}>🎓</div>
              <h1 style={{ margin:0, fontSize:32, fontWeight:800, color:"#1a1a2e" }}>UK Student Loan Calculator</h1>
              <p style={{ margin:"8px 0 0", color:"#555", fontSize:16 }}>Plan 1 · Plan 2 · Plan 4 · Plan 5 · Postgraduate — 2024/25</p>
            </div>

            <div style={{ background:"#fff", borderRadius:16, padding:28, boxShadow:"0 4px 24px rgba(0,0,0,0.08)", marginBottom:24 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px,1fr))", gap:20 }}>
                <div>
                  <label style={labelStyle}>Loan Plan</label>
                  <select value={plan} onChange={e=>setPlan(e.target.value)} style={inputStyle}>
                    {Object.entries(PLANS).map(([k,p])=><option key={k} value={k}>{p.name}</option>)}
                  </select>
                  <div style={{ fontSize:12, color:"#888", marginTop:6 }}>{PLANS[plan].desc}</div>
                </div>
                <div>
                  <label style={labelStyle}>Current Loan Balance</label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#666", fontWeight:700 }}>£</span>
                    <input type="number" value={balance} onChange={e=>setBalance(e.target.value)} style={{ ...inputStyle, paddingLeft:28 }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Current Annual Salary</label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#666", fontWeight:700 }}>£</span>
                    <input type="number" value={salary} onChange={e=>setSalary(e.target.value)} style={{ ...inputStyle, paddingLeft:28 }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Annual Salary Growth (%)</label>
                  <div style={{ position:"relative" }}>
                    <input type="number" value={salaryGrowth} min="0" max="20" onChange={e=>setSalaryGrowth(e.target.value)} style={{ ...inputStyle, paddingRight:32 }} />
                    <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:"#666", fontWeight:600 }}>%</span>
                  </div>
                </div>
              </div>
              <button onClick={calculate} style={{ width:"100%", marginTop:24, padding:"16px", background:"linear-gradient(135deg, #7c3aed, #6d28d9)", color:"#fff", border:"none", borderRadius:12, fontSize:18, fontWeight:700, cursor:"pointer" }}>
                Calculate Repayments
              </button>
            </div>

            {result && <>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(170px,1fr))", gap:16, marginBottom:24 }}>
                {[
                  { label:"Monthly Repayment", value: result.monthlyRepayment > 0 ? fmt(result.monthlyRepayment/12*12/12) + "/mo" : "£0 (below threshold)", color:"#7c3aed", bg:"#faf5ff" },
                  { label:"Total Repaid", value: fmt(result.totalPaid), color:"#dc2626", bg:"#fff5f5" },
                  { label:"Written Off After", value: result.paidOff ? `Paid off in ${result.yearsPaid} yrs` : `${result.plan.writeOff} years`, color: result.paidOff ? "#059669" : "#d97706", bg: result.paidOff ? "#f0fdf4" : "#fffbeb" },
                  { label:"Amount Written Off", value: result.writtenOff > 0 ? fmt(result.writtenOff) : "£0 (fully paid)", color: result.writtenOff > 0 ? "#059669" : "#7c3aed", bg:"#f0fdf4" },
                ].map((item,i)=>(
                  <div key={i} style={{ background:item.bg, borderRadius:14, padding:20, textAlign:"center", border:`2px solid ${item.color}22` }}>
                    <div style={{ fontSize:20, fontWeight:800, color:item.color }}>{item.value}</div>
                    <div style={{ fontSize:13, color:"#555", marginTop:4, fontWeight:500 }}>{item.label}</div>
                  </div>
                ))}
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:24 }}>
                <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
                  <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>Repayment Summary</h3>
                  {[
                    { label:"Loan Balance", value:fmt(result.bal) },
                    { label:"Repayment Threshold", value:fmt(result.plan.threshold)+"/yr", color:"#7c3aed" },
                    { label:"Repayment Rate", value: (result.plan.rate*100)+"%", color:"#7c3aed" },
                    { label:"Interest Rate", value: (result.plan.interestRate*100).toFixed(1)+"%", color:"#dc2626" },
                    { label:"Monthly Repayment Now", value: result.monthlyRepayment > 0 ? fmt(result.monthlyRepayment) : "£0", bold:true },
                    { label:"Total Interest Paid", value:fmt(result.totalInterest), color:"#dc2626" },
                    { label:"Total Cost", value:fmt(result.totalPaid), bold:true, color:"#dc2626", border:true },
                  ].map((row,i)=>(
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"9px 0", borderTop:row.border?"2px solid #e9ecef":"1px solid #f1f3f5" }}>
                      <span style={{ fontSize:14, color:"#444", fontWeight:row.bold?700:400 }}>{row.label}</span>
                      <span style={{ fontSize:14, fontWeight:row.bold?700:600, color:row.color||"#222" }}>{row.value}</span>
                    </div>
                  ))}
                </div>
                <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
                  <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>Balance Over Time</h3>
                  {result.yearlyData.slice(0,10).map((y,i)=>(
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #f1f3f5" }}>
                      <span style={{ fontSize:13, color:"#666" }}>Year {y.year}</span>
                      <span style={{ fontSize:13, color:"#7c3aed" }}>Pay: {fmt(y.repayment)}</span>
                      <span style={{ fontSize:13, fontWeight:600, color: y.balance < result.bal * 0.3 ? "#059669" : "#333" }}>Bal: {fmt(y.balance)}</span>
                    </div>
                  ))}
                  {result.yearlyData.length > 10 && <div style={{ fontSize:12, color:"#888", marginTop:8, textAlign:"center" }}>…through year {result.yearsPaid || result.plan.writeOff}</div>}
                </div>
              </div>

              <div style={{ background:"#fff3cd", border:"1px solid #ffc107", borderRadius:12, padding:16, fontSize:13, color:"#664d03" }}>
                <strong>Note:</strong> Interest rates shown are approximate (2024/25). Actual rates adjust with RPI/RPI+3% annually. Repayments shown assume current salary grows at {result.sal > 0 ? salaryGrowth : 0}%/yr. Use <a href="https://www.gov.uk/repaying-your-student-loan" style={{ color:"#664d03" }}>gov.uk</a> for official figures.
              </div>
            </>}

            <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", marginTop:24 }}>
              <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>📋 Plan Quick Reference (2024/25)</h3>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead><tr style={{ background:"#f5f3ff" }}>{["Plan","Threshold","Rate","Interest","Write-off"].map(h=><th key={h} style={{ padding:"10px 12px", textAlign:"left", fontWeight:700 }}>{h}</th>)}</tr></thead>
                  <tbody>
                    {Object.values(PLANS).map((p,i)=>(
                      <tr key={i} style={{ borderBottom:"1px solid #f1f3f5", background:i%2===0?"#fff":"#fafafa" }}>
                        <td style={{ padding:"9px 12px", fontWeight:600, color:"#7c3aed" }}>{p.name}</td>
                        <td style={{ padding:"9px 12px" }}>£{p.threshold.toLocaleString()}</td>
                        <td style={{ padding:"9px 12px" }}>{(p.rate*100)}%</td>
                        <td style={{ padding:"9px 12px" }}>~{(p.interestRate*100).toFixed(1)}%</td>
                        <td style={{ padding:"9px 12px" }}>{p.writeOff} years</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
